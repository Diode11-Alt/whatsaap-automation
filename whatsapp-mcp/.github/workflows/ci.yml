name: WhatsApp Bot CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Syntax Check Python
      run: |
        python -m py_compile auto_reply.py
        
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.21"
        
    - name: Build Go Bridge
      run: |
        cd whatsapp-bridge
        go build -v ./...
